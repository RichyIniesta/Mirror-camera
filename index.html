<!DOCTYPE html>
<html>
<head>
    <title>Webcam Real-time Mirror + Download</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #1a1a1a; 
            color: white; 
            margin-top: 30px;
        }
        canvas { 
            border: 4px solid #444; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
        #video { display: none; } /* El video original no se muestra */
        
        .controls { margin: 20px; }
        
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        
        button:hover { background-color: #0056b3; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h3>Espejo Simétrico en Tiempo Real</h3>
    
    <video id="video" width="500" height="500" autoplay></video>
    <canvas id="canvas" width="500" height="500"></canvas>

    <div class="controls">
        <button id="downloadBtn">Descargar Captura</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');

        // 1. Acceder a la cámara
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream;
                video.play();
                draw(); 
            })
            .catch(err => alert("Error al acceder a la cámara: " + err));

        // 2. Bucle de dibujo (60 fps aprox)
        function draw() {
            const w = canvas.width;
            const h = canvas.height;

            // Dibujar mitad izquierda original
            context.drawImage(video, 0, 0, w / 2, h, 0, 0, w / 2, h);

            // Dibujar mitad derecha espejada
            context.save();
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, w / 2, h, -w, 0, w / 2, h);
            context.restore();

            requestAnimationFrame(draw);
        }

        // 3. Lógica de descarga
        downloadBtn.addEventListener('click', () => {
            // Convertir el contenido del canvas a una URL de imagen (PNG)
            const imageURL = canvas.toDataURL("image/png");
            
            // Crear un enlace temporal "fantasma" para forzar la descarga
            const link = document.createElement('a');
            link.href = imageURL;
            link.download = `espejo-captura-${Date.now()}.png`; // Nombre único con timestamp
            link.click();
        });
    </script>
</body>
</html>
