<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Webcam Real-time Mirror + Download</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h3 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .canvas-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }

        canvas { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 1 / 1; 
            border: 4px solid #444; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
        
        #video { display: none; }
        
        .controls { 
            margin-top: 25px;
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            width: 100%;
            max-width: 400px;
        }
        
        button {
            width: 100%; 
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 20px; 
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        button:active { transform: scale(0.98); }
        
        #switchBtn { background-color: #28a745; }
        #invertBtn { background-color: #fd7e14; } /* Color naranja para distinguirlo */
        #downloadBtn { background-color: #007bff; }

        @media (min-width: 600px) {
            .controls {
                flex-direction: row; 
                flex-wrap: wrap; /* Permite que los botones bajen a la siguiente línea si no caben */
                max-width: 600px;
                justify-content: center;
            }
            button {
                width: auto; /* En PC se ajustan a su contenido */
                flex-grow: 1; /* Crecen para llenar el espacio equitativamente */
            }
        }
    </style>
</head>
<body>
    <h3>Espejo Simétrico</h3>
    
    <video id="video" width="500" height="500" autoplay playsinline></video>
    
    <div class="canvas-container">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <button id="switchBtn">🔄 Cambiar Cámara</button>
        <button id="invertBtn">🪞 Invertir Espejo</button>
        <button id="downloadBtn">📸 Descargar Captura</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const switchBtn = document.getElementById('switchBtn');
        const invertBtn = document.getElementById('invertBtn');

        let currentStream = null;
        let useFrontCamera = true;
        let isDrawing = false;
        let mirrorLeftHalf = true; // Controla qué mitad se espeja

        function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 500 },
                    height: { ideal: 500 }
                }
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => { 
                    currentStream = stream;
                    video.srcObject = stream;
                    video.play();
                    
                    if (!isDrawing) {
                        isDrawing = true;
                        draw(); 
                    }
                })
                .catch(err => alert("Error al acceder a la cámara: " + err));
        }

        function draw() {
            if (video.paused || video.ended) {
                requestAnimationFrame(draw);
                return;
            }

            const w = canvas.width;
            const h = canvas.height;

            context.clearRect(0, 0, w, h);

            if (mirrorLeftHalf) {
                // Modo 1: Usa la mitad izquierda original y la espeja hacia la derecha
                context.drawImage(video, 0, 0, w / 2, h, 0, 0, w / 2, h);
                
                context.save();
                context.scale(-1, 1);
                context.drawImage(video, 0, 0, w / 2, h, -w, 0, w / 2, h);
                context.restore();
            } else {
                // Modo 2: Usa la mitad derecha original y la espeja hacia la izquierda
                context.drawImage(video, w / 2, 0, w / 2, h, w / 2, 0, w / 2, h);
                
                context.save();
                context.scale(-1, 1);
                // El cálculo en 'dx' cambia a -w/2 para acomodarse en la mitad izquierda
                context.drawImage(video, w / 2, 0, w / 2, h, -w / 2, 0, w / 2, h);
                context.restore();
            }

            requestAnimationFrame(draw);
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        // Alterna entre espejar el lado izquierdo o el derecho
        invertBtn.addEventListener('click', () => {
            mirrorLeftHalf = !mirrorLeftHalf;
        });

        downloadBtn.addEventListener('click', () => {
            const imageURL = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = imageURL;
            link.download = `espejo-${mirrorLeftHalf ? 'izq' : 'der'}-${Date.now()}.png`; 
            link.click();
        });

        startCamera();
    </script>
</body>
</html>
